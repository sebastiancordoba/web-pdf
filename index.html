<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zathura Web Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: #1a1b26;
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dark Mode Recolor (Zathura Style) */
        .pdf-dark-mode .pdf-page-wrapper {
            filter: invert(0.9) hue-rotate(180deg) contrast(0.9) brightness(1.1);
        }

        .status-bar {
            background-color: #24283b;
            color: #a9b1d6;
            font-size: 0.85rem;
        }

        /* Text Layer for Selection */
        .textLayer {
            position: absolute;
            text-align: initial;
            inset: 0;
            overflow: hidden;
            opacity: 1;
            line-height: 1;
            text-rendering: optimizeLegibility;
            pointer-events: auto;
            user-select: text;
        }

        .textLayer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }

        .textLayer ::selection {
            background: rgba(0, 80, 255, 0.25);
        }

        /* Search Highlights */
        .search-highlight {
            background-color: rgba(255, 255, 0, 0.6);
            color: black;
            border-radius: 1px;
        }

        .search-highlight-active {
            background-color: rgba(255, 128, 0, 0.9) !important;
            box-shadow: 0 0 4px rgba(255, 128, 0, 0.6);
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
    </style>
